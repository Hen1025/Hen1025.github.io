<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timeline</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
    }

    header, footer {
      background: #222;
      color: white;
      text-align: center;
      padding: 1rem;
    }

    main {
      padding: 2rem;
      position: relative;
    }

    /* Timeline spine */
    .timeline {
      position: relative;
      max-width: 800px;
      margin: auto;
    }

    .timeline::after {
      content: '';
      position: absolute;
      width: 4px;
      background: #333;
      top: 0;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
    }

    /* Timeline item */
    .entry {
      padding: 1rem 2rem;
      position: relative;
      width: 50%;
    }

    .entry.left {
      left: 0;
      text-align: right;
    }

    .entry.right {
      left: 50%;
    }

    /* Circle node */
    .entry::before {
      content: '';
      position: absolute;
      width: 15px;
      height: 15px;
      background: white;
      border: 4px solid #333;
      border-radius: 50%;
      top: 20px;
      z-index: 1;
    }

    .entry.left::before {
      right: -10px;
    }

    .entry.right::before {
      left: -10px;
    }

    /* Content box */
    .content {
      background: white;
      padding: 1rem;
      border-radius: 6px;
    }

    .year {
      font-weight: bold;
      font-size: 1.2rem;
      color: #333;
    }

    /* Responsive (mobile) */
    @media (max-width: 600px) {
      .timeline::after {
        left: 20px;
      }

      .entry {
        width: 100%;
        padding-left: 40px;
        padding-right: 20px;
      }

      .entry.left,
      .entry.right {
        left: 0;
        text-align: left;
      }

      .entry::before {
        left: 10px;
      }
    }
  </style>
</head>

<body>

  <!-- Accessibility landmarks -->
  <header role="banner">
    <h1>History Timeline</h1>
  </header>

  <main role="main">
    <section class="timeline" aria-label="Historical timeline">

      <!-- Entry 1 -->
      <article class="entry left">
        <div class="content">
          <div class="year">1989</div>
          <p>Tim Berners-Lee proposes the World Wide Web.</p>
        </div>
      </article>

      <!-- Entry 2 -->
      <article class="entry right">
        <div class="content">
          <div class="year">1991</div>
          <p>The first website goes live.</p>
        </div>
      </article>

      <!-- Entry 3 -->
      <article class="entry left">
        <div class="content">
          <div class="year">1993</div>
          <p>The Mosaic web browser is released.</p>
        </div>
      </article>

      <!-- Entry 4 with required link -->
      <article class="entry right">
        <div class="content">
          <div class="year">1990</div>
          <p>
            Collaboration with 
            <a href="../about/people/people.html#cailliau">RC</a>
            helped develop the early web.
          </p>
        </div>
      </article>

    </section>
  </main>

  <footer role="contentinfo">
    <p>&copy; 2026 Timeline Project</p>
  </footer>

</body>
</html>
